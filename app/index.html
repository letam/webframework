<!DOCTYPE html>
<html lang="en">

<head>
  <!-- TIMESTAMP -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/svg+xml" href="/vite-logo.svg" />
  <link rel="apple-touch-icon" href="/vite-logo.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <title>Echo Sphere</title>
  <meta
    name="description"
    content="Echo Sphere — a micro-blogging space for short posts with audio, video, and images."
  />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f8ff" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#020817" />
  <!-- <meta name="author" content="" /> -->

  <meta property="og:title" content="Echo Sphere" />
  <meta
    property="og:description"
    content="Echo Sphere — a micro-blogging space for short posts with audio, video, and images."
  />
  <meta property="og:site_name" content="Echo Sphere" />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@slowpowk" />

  <script>
    // Blocking script to set theme before any content renders
    (() => {
      // This script runs before the page renders to prevent flash of unstyled content
      try {
        const theme = (() => {
          if (typeof localStorage !== "undefined") {
            const savedTheme = localStorage.getItem("app-theme");
            if (savedTheme) return savedTheme;
          }
          if (typeof window !== "undefined") {
            if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
              return "dark";
            }
          }
          return "light";
        })();

        if (theme === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      } catch (e) {
        console.error("Error setting theme:", e);
      }
    })();
  </script>

  <style>
    /* Prevent flash of unstyled content */
    :root {
      color-scheme: light dark;
    }

    .dark {
      color-scheme: dark;
    }
  </style>

  <link href="/src/index.css" rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>

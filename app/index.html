  <script>
    // Blocking script to set theme before any content renders
    (function () {
      // This script runs before the page renders to prevent flash of unstyled content
      try {
        const theme = (() => {
          if (typeof localStorage !== "undefined") {
            const savedTheme = localStorage.getItem("app-theme");
            if (savedTheme) return savedTheme;
          }
          if (typeof window !== "undefined") {
            if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
              return "dark";
            }
          }
          return "light";
        })();

        if (theme === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      } catch (e) {
        console.error("Error setting theme:", e);
      }
    })();
  </script>

  <style>
    /* Prevent flash of unstyled content (warm paper / espresso, matching index.css tokens) */
    :root {
      color-scheme: light dark;
      background-color: hsl(38 40% 95%);
    }

    .dark {
      color-scheme: dark;
      background-color: hsl(24 16% 8%);
    }
  </style>

# Test and build gates. Runs on every push/PR to main, and is reused by the
# deploy workflow (workflow_call) so nothing ships without green tests.

name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_call:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Media tests exercise ffprobe/ffmpeg integration
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      # settings.py auto-creates a dev server/.env on first run. The 'apps'
      # label is required: bare 'test' from the repo root discovers 0 tests.
      - run: uv run python server/manage.py test apps
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bunx vitest run
      - run: bun run build
